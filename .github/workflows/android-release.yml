name: Build and Release Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > local.properties

      - name: Grant Execute Permissions for gradlew
        run: chmod +x gradlew

      - name: Build Android APK
        run: ./gradlew :androidApp:app:assembleDebug

      - name: Get Version Name
        id: version
        run: |
          # Simple extraction of versionName from build.gradle.kts
          VERSION=$(grep "versionName =" androidApp/app/build.gradle.kts | awk -F'"' '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ env.VERSION }}-b${{ github.run_number }}
          name: Release v${{ env.VERSION }} (Build ${{ github.run_number }})
          draft: false
          prerelease: false
          files: androidApp/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
