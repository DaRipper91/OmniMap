name: Build and Release Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> local.properties
          # Also create in androidApp
          mkdir -p androidApp
          cp local.properties androidApp/local.properties

      - name: Grant Execute Permissions for gradlew
        run: chmod +x gradlew

      - name: Build Android APK
        run: |
          ./gradlew :androidApp:assembleDebug -Pkotlin.mpp.androidGradlePluginCompatibility.nowarn=true

      - name: Find APK
        run: |
          # Find the actual APK path and set it as an env var
          APK_PATH=$(find androidApp/build/outputs/apk/debug -name "*.apk" | head -n 1)
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "Found APK at: $APK_PATH"

      - name: Get Version Name
        id: version
        run: |
          VERSION=$(grep "versionName =" androidApp/build.gradle.kts | awk -F'"' '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniMap-Android-Debug
          path: ${{ env.APK_PATH }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ env.VERSION }}-b${{ github.run_number }}
          name: Release v${{ env.VERSION }} (Build ${{ github.run_number }})
          draft: false
          prerelease: false
          files: ${{ env.APK_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
